<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Crush</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #c1121f;
      --text: #ffffff;
      --muted: #ffe5e7;
      --accent: #ffffff;
      --accent2: #ffccd2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #8b0000;
      background: radial-gradient(circle at top right, #ffb3ba 0%, var(--bg) 45%), var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(145deg, #d90429, var(--card));
      border: 1px solid rgba(193, 18, 31, 0.35);
      border-radius: 18px;
      padding: 36px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      letter-spacing: 0.3px;
    }

    .gradient {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      margin-top: 14px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      max-width: 60ch;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 600;
      transition: transform .2s ease, opacity .2s ease;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      color: #b00020;
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.25);
      color: var(--text);
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    footer {
      margin-top: 28px;
      color: #8a93be;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome to <span class="gradient">Tech Crush</span></h1>
    <p>
      Your space for technology news, coding inspiration, and digital creativity.
      Build, learn, and grow with the latest in tech.
    </p>

    <div class="actions">
      <a href="#" class="btn btn-primary">Get Started</a>
      <a href="#" class="btn btn-secondary">Learn More</a>
    </div>

    <footer>© 2026 Tech Crush. All rights reserved.</footer>
  </main>
</body>
</html>
